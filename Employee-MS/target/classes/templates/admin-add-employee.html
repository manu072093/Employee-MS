<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Employee</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2>Add New Employee</h2>
    <form action="/admin/add-employee" method="post" class="w-50">
        <input class="form-control mb-2" name="firstName" placeholder="First Name" required>
        <input class="form-control mb-2" name="lastName" placeholder="Last Name" required>
        <input class="form-control mb-2" name="email" placeholder="Email" required>
        <input class="form-control mb-2" name="password" placeholder="Password" required>
        <input class="form-control mb-2" name="mobileNumber" placeholder="Mobile Number" required>
        <input class="form-control mb-2" name="department" placeholder="Department" required>
        <button class="btn btn-success w-100">Add Employee</button>
    </form>
</div>
</body>
</html>
