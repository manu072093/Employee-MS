<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2>Edit Profile</h2>
    <form action="/admin/edit-profile" method="post" class="w-50">
        <input type="hidden" name="id" th:value="${admin.id}">
        <input class="form-control mb-2" name="firstName" th:value="${admin.firstName}" placeholder="First Name">
        <input class="form-control mb-2" name="lastName" th:value="${admin.lastName}" placeholder="Last Name">
        <input class="form-control mb-2" name="mobileNumber" th:value="${admin.mobileNumber}" placeholder="Mobile Number">
        <button class="btn btn-primary w-100">Update</button>
    </form>
</div>
</body>
</html>
