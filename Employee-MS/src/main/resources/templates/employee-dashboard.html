<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Dashboard - CREANT Technologies</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-4">
	<div class="text-center mt-5">
    <h1>Employee Dashboard</h1>
  	</div>
    <h2>Welcome, <span th:text="${employee.firstName}"></span></h2>
    <p>
        <a href="/employee/edit-profile" class="btn btn-primary">Edit Profile</a>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </p>
    <h4>Your Details</h4>
    <table class="table table-bordered mt-2">
        <tr><th>First Name</th><td th:text="${employee.firstName}"></td></tr>
        <tr><th>Last Name</th><td th:text="${employee.lastName}"></td></tr>
        <tr><th>Email</th><td th:text="${employee.email}"></td></tr>
        <tr><th>Mobile</th><td th:text="${employee.mobileNumber}"></td></tr>
        <tr><th>Department</th><td th:text="${employee.department}"></td></tr>
    </table>
</div>
</body>
</html>
