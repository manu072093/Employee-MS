<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - CREANT Technologies </title>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-4">
	<div class="text-center mt-5">
    <h1>Admin Dashboard</h1>
  	</div>
    <h2>Welcome, <span th:text="${admin.firstName}"></span> (Admin)</h2>
    <p>
        <a href="/admin/add-employee" class="btn btn-success">Add Employee</a>
        <a href="/admin/edit-profile" class="btn btn-primary">Edit Profile</a>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </p>
    <h4 class="mt-4">All Employees</h4>
    <table class="table table-bordered mt-2">
        <thead>
            <tr>
                <th>ID</th><th>First Name</th><th>Last Name</th><th>Email</th><th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="emp : ${employees}">
                <td th:text="${emp.id}"></td>
                <td th:text="${emp.firstName}"></td>
                <td th:text="${emp.lastName}"></td>
                <td th:text="${emp.email}"></td>
                <td>
                    <a th:href="@{'/admin/delete/' + ${emp.id}}" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
